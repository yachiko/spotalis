name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Verify go.mod and go.sum
        run: make deps

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: make deps

      - name: Build application
        run: make build

      - name: Run unit tests
        run: make test

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build docker image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584  # v7
        with:
          set: |
            *.tags=spotalis:local
            *.platform=linux/amd64
            *.output=type=docker,dest=${{ runner.temp }}/spotalis.tar

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: spotalis
          path: ${{ runner.temp }}/spotalis.tar

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: spotalis
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/spotalis.tar
          docker tag spotalis:local ghcr.io/yachiko/spotalis:latest
          docker image ls -a

      - name: Set up Kind
        uses: helm/kind-action@0b5c88445f37b7e12a2ce1ecca7805b9046a74db  # v1
        with:
          install_only: true

      - name: Create Kind cluster
        run: make kind

      - name: Load Docker image to Kind
        run: kind load docker-image ghcr.io/yachiko/spotalis:latest --name spotalis

      - name: Deploy Spotalis
        run: make deploy

      - name: Run integration tests
        run: make test-integration
