version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      go-modules:
        applies-to: version-updates
        patterns:
          - "*"
      go-modules-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      docker:
        applies-to: version-updates
        patterns:
          - "*"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
