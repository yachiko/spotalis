version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
    assignees:
      - "yachiko"
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
